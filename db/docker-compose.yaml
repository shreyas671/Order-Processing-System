version: "3"

services:
  catalog_postgres:
    image: "postgres:14.0"
    ports:
      - "5432:5432"
    deploy:
      mode: replicated
      replicas: 1
    environment:
      POSTGRES_USER: catalog_db
      POSTGRES_PASSWORD: catalog_db_password
      POSTGRES_DB: catalog_service
    volumes: 
      - ./db-data/postgres/:/var/lib/postgresql/data
  order_postgres:
    image: "postgres:14.0"
    ports:
      - "5433:5433"
    deploy:
      mode: replicated
      replicas: 1
    environment:
      POSTGRES_USER: order_db
      POSTGRES_PASSWORD: order_db_password
      POSTGRES_DB: order_service
    volumes: 
      - ./db-data/order_db_server/:/var/lib/postgresql/data
  user_db_server:
    image: "postgres:14.0"
    ports:
      - "5442:5442"
    deploy:
      mode: replicated
      replicas: 1
    environment:
      POSTGRES_USER: user_db
      POSTGRES_PASSWORD: user_db_password
      POSTGRES_DB: user_service
    volumes: 
      - ./db-data/user_db_server/:/var/lib/postgresql/data